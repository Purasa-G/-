<!-- templates/public_download.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>下载文件</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        .filename { background: #f0f0f0; padding: 8px; border-radius: 4px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>安全文件分享</h2>
    <p>请输⼊加密密码以下载文件：</p>
    
    <div class="filename">📁 {{ filename }}</div>

    <form method="post">
        <input type="password" name="password" placeholder="请输入密码" required>
        <br>
        <button type="submit">解密并下载</button>
    </form>

    <p><small>⚠️ 此链接为一次性使用，下载后将失效</small></p>
</body>
</html>
